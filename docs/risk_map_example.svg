<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f4f6f9" />
  
  <!-- Title & Metadata -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#202124">Ethiopia Livestock Disease Risk Map</text>
  <text x="40" y="65" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Forecast Period: August 2026 | Multi-Agent Simulation Output</text>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#1a73e8">Focus: Southwest Rift Valley &amp; Omo Basin (Jinka Lab)</text>

  <!-- Simplified Ethiopia Landmass -->
  <path d="M 350 120 L 450 110 L 580 160 L 680 250 L 620 450 L 480 550 L 380 540 L 250 480 L 180 380 L 210 220 Z" 
        fill="#e0e0e0" stroke="#bdbdbd" stroke-width="2" />

  <!-- Regional Boundary Lines (Conceptual) -->
  <path d="M 350 120 Q 400 250 480 550" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,2" /> <!-- North-South Axis -->
  <path d="M 210 220 Q 400 300 680 250" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,2" /> <!-- East-West Axis -->

  <!-- RISK HOTSPOTS & DISTRICT MARKERS -->
  
  <!-- Jinka (South Ethiopia) - VERY HIGH RISK -->
  <g id="marker-jinka">
    <circle cx="310" cy="460" r="25" fill="#d93025" fill-opacity="0.3" />
    <circle cx="310" cy="460" r="6" fill="#d93025" stroke="#ffffff" stroke-width="2" />
    <text x="320" y="465" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a50e0e">Jinka (Anthrax)</text>
  </g>

  <!-- Asayita (Afar) - HIGH RISK -->
  <g id="marker-asayita">
    <circle cx="520" cy="180" r="20" fill="#d93025" fill-opacity="0.3" />
    <circle cx="520" cy="180" r="6" fill="#d93025" stroke="#ffffff" stroke-width="2" />
    <text x="530" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a50e0e">Asayita (PPR)</text>
  </g>

  <!-- Yabelo (Oromia) - MEDIUM RISK -->
  <g id="marker-yabelo">
    <circle cx="410" cy="480" r="15" fill="#f29900" fill-opacity="0.3" />
    <circle cx="410" cy="480" r="6" fill="#f29900" stroke="#ffffff" stroke-width="2" />
    <text x="420" y="485" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b06000">Yabelo (FMD)</text>
  </g>

  <!-- Bako Gazer (South Ethiopia) - MEDIUM RISK -->
  <g id="marker-bako">
    <circle cx="340" cy="430" r="15" fill="#f29900" fill-opacity="0.3" />
    <circle cx="340" cy="430" r="6" fill="#f29900" stroke="#ffffff" stroke-width="2" />
    <text x="350" y="435" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Bako Gazer</text>
  </g>

  <!-- Awasa (Sidama) - LOW RISK -->
  <g id="marker-awasa">
    <circle cx="390" cy="380" r="10" fill="#34a853" fill-opacity="0.3" />
    <circle cx="390" cy="380" r="6" fill="#34a853" stroke="#ffffff" stroke-width="2" />
    <text x="400" y="385" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Awasa</text>
  </g>

  <!-- Axum (Tigray) - LOW RISK -->
  <g id="marker-axum">
    <circle cx="380" cy="150" r="10" fill="#34a853" fill-opacity="0.3" />
    <circle cx="380" cy="150" r="6" fill="#34a853" stroke="#ffffff" stroke-width="2" />
    <text x="390" y="155" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Axum</text>
  </g>

  <!-- LEGEND PANEL -->
  <g id="legend">
    <rect x="580" y="440" width="180" height="130" rx="8" fill="#ffffff" stroke="#bdbdbd" />
    <text x="595" y="465" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#202124">Risk Legend</text>
    
    <!-- Red -->
    <circle cx="605" y="485" r="5" fill="#d93025" />
    <text x="620" y="490" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Very High / High Risk</text>
    
    <!-- Orange -->
    <circle cx="605" y="510" r="5" fill="#f29900" />
    <text x="620" y="515" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Medium Risk</text>
    
    <!-- Green -->
    <circle cx="605" y="535" r="5" fill="#34a853" />
    <text x="620" y="540" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Low / Normal Risk</text>

    <!-- Pathogen Info -->
    <text x="595" y="562" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Model: Logistic Sigmoid (u=0.85)</text>
  </g>

  <!-- Compass / Orientation -->
  <g id="compass" transform="translate(720, 80)">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#5f6368" stroke-width="1.5" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#5f6368" stroke-width="1.5" />
    <text x="0" y="-25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#202124">N</text>
  </g>
</svg>
